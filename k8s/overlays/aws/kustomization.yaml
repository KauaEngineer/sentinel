apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sentinel

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: backend-patch.yaml
  - path: frontend-patch.yaml

# Remove local postgres — using RDS in AWS
patchesJson6902:
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          sentinel/note: "Not used in AWS — RDS replaces local postgres"

images:
  - name: sentinel-backend
    newName: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sentinel/backend
    newTag: latest
  - name: sentinel-mock-services
    newName: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sentinel/mock-services
    newTag: latest
  - name: sentinel-frontend
    newName: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sentinel/frontend
    newTag: latest
