apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sentinel
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: MONITOR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rds-credentials
                  key: DATABASE_URL
---
apiVersion: v1
kind: Secret
metadata:
  name: rds-credentials
  namespace: sentinel
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://monitor:CHANGE_ME@sentinel-db.xxxx.us-east-1.rds.amazonaws.com:5432/monitor"
