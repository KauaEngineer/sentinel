apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-services
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-services
  template:
    metadata:
      labels:
        app: mock-services
    spec:
      containers:
        - name: mock-services
          image: sentinel-mock-services:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /services
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-services
  namespace: sentinel
spec:
  selector:
    app: mock-services
  ports:
    - port: 8001
      targetPort: 8001
