apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: sentinel
  annotations:
    sentinel/note: "Replace with External Secrets or sealed-secrets in production"
type: Opaque
stringData:
  POSTGRES_USER: monitor
  POSTGRES_PASSWORD: monitor
  POSTGRES_DB: monitor
  DATABASE_URL: postgresql+asyncpg://monitor:monitor@postgres:5432/monitor
